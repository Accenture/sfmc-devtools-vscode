name: Sync Milestone from Issue
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  sync-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
    steps:
      - name: Sync Milestone
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Get the milestone of the officially linked issues via GraphQL
          # This catches issues linked via "Fixes #123" and similar in the body or the UI sidebar.
          MILESTONE_NUMBER=$(gh api graphql -f query='
            query($repo: String!, $pr: Int!) {
              repository(owner: "${{ github.repository_owner }}", name: "'${REPO#*/}'") {
                pullRequest(number: $pr) {
                  closingIssuesReferences(first: 1) {
                    nodes {
                      milestone {
                        number
                      }
                    }
                  }
                }
              }
            }' -F repo="$REPO" -F pr=$PR_NUMBER --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[0].milestone.number')

          # 2. Check if a milestone was found
          if [ "$MILESTONE_NUMBER" != "null" ] && [ -n "$MILESTONE_NUMBER" ]; then
            echo "Found milestone $MILESTONE_NUMBER from linked issue. Assigning to PR..."
            gh pr edit $PR_NUMBER --milestone "$MILESTONE_NUMBER" --repo "$REPO"
          else
            echo "No milestone found on linked issues or no issues linked."
          fi
